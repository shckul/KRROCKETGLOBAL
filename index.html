<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KR JET — Telegram Stars Casino</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ОБНУЛЕНИЕ И БАЗОВЫЕ СТИЛИ (ПОД МОБИЛЬНЫЕ) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* --- ГЛАВНЫЙ КОНТЕЙНЕР ПРИЛОЖЕНИЯ --- */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 12px;
            gap: 12px;
        }

        /* --- ШАПКА ИГРЫ (БАЛАНС И ПРОФИЛЬ) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #151a26 0%, #1a2233 100%);
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #00ffcc, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-section {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .balance-icon {
            color: #ffb700;
            font-size: 16px;
            font-weight: bold;
        }

        .balance-value {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            font-family: monospace;
        }

        .btn-deposit {
            background: linear-gradient(90deg, #ffb700, #ff8800);
            border: none;
            color: #000000;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 183, 0, 0.3);
            transition: transform 0.1s ease;
        }

        .btn-deposit:active {
            transform: scale(0.95);
        }

        /* --- ИСТОРИЯ КОЭФФИЦИЕНТОВ (ЛЕНТА ИКСОВ) --- */
        .history-ribbon {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding: 4px 0;
            scrollbar-width: none; /* Скрываем скроллбар */
        }

        .history-ribbon::-webkit-scrollbar {
            display: none;
        }

        .history-item {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            font-family: monospace;
            background: rgba(255, 255, 255, 0.05);
            color: #9aa0a6;
        }

        .history-item.low { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); }
        .history-item.medium { color: #3399ff; background: rgba(51, 153, 255, 0.1); }
        .history-item.high { color: #00ffcc; background: rgba(0, 255, 204, 0.1); }

        /* --- ЭКРАН ИГРЫ (ГРАФИК И АНИМАЦИЯ РАКЕТЫ) --- */
        .game-display {
            position: relative;
            flex: 1;
            background: #111622;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Сетка на заднем фоне */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .grid-bg.moving {
            animation: gridMove 4s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-40px, 40px); }
        }

        /* Главный текст внутри экрана */
        .display-content {
            z-index: 2;
            text-align: center;
        }

        .main-multiplier {
            font-size: 56px;
            font-weight: 900;
            font-family: monospace;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .main-multiplier.flying {
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        .main-multiplier.crashed {
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
        }

        .status-text {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7a8194;
            margin-top: 4px;
            font-weight: 600;
        }

        /* Анимированная ракета */
        .rocket-container {
            position: absolute;
            bottom: 20%;
            left: 20%;
            width: 64px;
            height: 64px;
            z-index: 2;
            display: none;
            transition: transform 0.1s linear;
        }

        .rocket-svg {
            width: 100%;
            height: 100%;
            transform: rotate(45deg);
        }

        .rocket-container.active {
            display: block;
            animation: rocketWobble 0.15s ease-in-out infinite alternate;
        }

        @keyframes rocketWobble {
            0% { transform: translateY(0px) translateX(0px); }
            100% { transform: translateY(-3px) translateX(2px); }
        }

        /* Рисование траектории полета */
        .trajectory-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .trajectory-path {
            fill: none;
            stroke: url(#line-gradient);
            stroke-width: 4;
            stroke-dasharray: 8 4;
            animation: dash 30s linear infinite;
        }

        /* --- БЛОК СТАВОК И УПРАВЛЕНИЯ (БЕТ-ПАНЕЛЬ) --- */
        .control-panel {
            background: linear-gradient(135deg, #151a26 0%, #1a2233 100%);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .bet-input-container {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            align-items: center;
        }

        .btn-minus, .btn-plus {
            width: 40px;
            height: 40px;
            background: #242c3d;
            border: none;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .bet-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            font-family: monospace;
            outline: none;
            width: 100%;
        }

        .quick-bet-row {
            display: flex;
            gap: 6px;
        }

        .btn-quick {
            flex: 1;
            background: #202738;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #9aa0a6;
            padding: 8px 0;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ГЛАВНЫЕ КНОПКИ ДЕЙСТВИЯ */
        .action-button-container {
            width: 100%;
            height: 56px;
            position: relative;
        }

        .action-btn {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: none; /* Управляется через JS */
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* Состояние кнопки: Сделать Ставку */
        #btn-place-bet {
            display: flex;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 114, 255, 0.4);
        }

        /* Состояние кнопки: Ожидание полета */
        #btn-waiting-bet {
            display: flex;
            background: #2c354a;
            color: #7a8194;
            cursor: not-allowed;
        }

        /* Состояние кнопки: ЗАБРАТЬ ВЫИГРЫШ */
        #btn-cashout-bet {
            display: flex;
            background: linear-gradient(90deg, #00ffcc, #00b386);
            color: #000000;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.5);
        }

        /* ---ОНЛАЙН ИГРОКИ (ТАБЛИЦА СТАВОК) --- */
        .players-panel {
            background: rgba(21, 26, 38, 0.6);
            border-radius: 16px;
            padding: 12px;
            height: 120px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .players-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
            color: #565e70;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }

        .players-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scrollbar-width: none;
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding: 4px 2px;
        }

        .p-name { color: #c2c7d6; font-weight: 500; }
        .p-bet { color: #ffffff; font-family: monospace; }
        .p-row-win {
            background: rgba(0, 255, 204, 0.08) !important;
            border-radius: 4px;
        }
        .p-row-win .p-name { color: #00ffcc; }
        .p-row-win .p-bet { color: #00ffcc; font-weight: bold; }

        /* --- ВСПЛЫВАЮЩИЕ ПЛАШКИ УВЕДОМЛЕНИЙ --- */
        .toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 51, 51, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 80%;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: rgba(0, 179, 134, 0.95);
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

    <div id="toast-msg" class="toast">Недостаточно баланса!</div>

    <div class="app-container">
        
        <div class="header">
            <div class="logo-section">
                <span class="logo-text">KR JET</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="balance-section">
                    <span class="balance-icon">⭐</span>
                    <span id="balance-display" class="balance-value">0</span>
                </div>
                <button class="btn-deposit" onclick="requestDeposit()">+</button>
            </div>
        </div>

        <div id="history-container" class="history-ribbon">
            </div>

        <div class="game-display">
            <div id="grid" class="grid-bg"></div>
            
            <svg class="trajectory-svg">
                <defs>
                    <linearGradient id="line-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#0072ff" />
                        <stop offset="100%" stop-color="#00ffcc" />
                    </linearGradient>
                </defs>
                <path id="flight-path" class="trajectory-path" d="M 0 0" />
            </svg>

            <div class="display-content">
                <div id="multiplier-text" class="main-multiplier">1.00x</div>
                <div id="status-text" class="status-text">Ожидание ставок</div>
            </div>

            <div id="rocket" class="rocket-container">
                <svg class="rocket-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C12 2 9 6 9 9C9 10.6569 10.3431 12 12 12C13.6569 12 15 10.6569 15 9C15 6 12 2 12 2Z" fill="#00ffcc"/>
                    <path d="M12 12V22M9 15L6 18M15 15L18 18" stroke="#ff3333" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <div class="players-panel">
            <div class="players-header">
                <span>Игрок</span>
                <span>Ставка (Stars)</span>
            </div>
            <div id="players-list" class="players-list">
                </div>
        </div>

        <div class="control-panel">
            <div class="bet-input-container">
                <button class="btn-minus" onclick="changeBet(-10)">-</button>
                <input id="bet-input-field" type="number" class="bet-input" value="10" min="5" step="5">
                <button class="btn-plus" onclick="changeBet(10)">+</button>
            </div>

            <div class="quick-bet-row">
                <button class="btn-quick" onclick="setBetValue(10)">10</button>
                <button class="btn-quick" onclick="setBetValue(50)">50</button>
                <button class="btn-quick" onclick="setBetValue(100)">100</button>
                <button class="btn-quick" onclick="setBetValue(500)">500</button>
            </div>

            <div class="action-button-container">
                <button id="btn-place-bet" class="action-btn" onclick="sendBet()">Поставить ставку</button>
                <button id="btn-waiting-bet" class="action-btn">Ожидание полета...</button>
                <button id="btn-cashout-bet" class="action-btn" onclick="sendCashout()">Забрать</button>
            </div>
        </div>

    </div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // Получаем реальные данные игрока из Telegram
        const userTelegramId = tg?.initDataUnsafe?.user?.id || 99999; 
        const userTelegramName = tg?.initDataUnsafe?.user?.first_name || "Местный разработчик";

        // Подключаемся к сокетам
        const socket = io();

        // Переменные состояния на клиенте
        let currentBalance = 0;
        let hasBetInCurrentRound = false;
        let alreadyCashedOut = false;
        let currentStatus = "WAITING";

        // DOM элементы кнопок
        const btnPlace = document.getElementById('btn-place-bet');
        const btnWaiting = document.getElementById('btn-waiting-bet');
        const btnCashout = document.getElementById('btn-cashout-bet');

        // Авторизация на сервере при коннекте
        socket.on('connect', () => {
            console.log("Соединение установлено. Авторизация...");
            socket.emit('auth_user', {
                userId: userTelegramId,
                username: userTelegramName
            });
        });

        // Получение и обновление баланса от сервера
        socket.on('update_balance', (data) => {
            currentBalance = data.balance;
            document.getElementById('balance-display').innerText = currentBalance;
        });

        // Первичная синхронизация истории и состояния при входе
        socket.on('init_state', (state) => {
            renderHistory(state.history);
            updateUI(state.status, 0);
        });

        // Главный игровой тик сервера
        socket.on('game_tick', (data) => {
            currentStatus = data.status;
            
            if (data.status === "WAITING") {
                alreadyCashedOut = false;
                document.getElementById('multiplier-text').innerText = `Ожидание`;
                document.getElementById('status-text').innerText = `Взлет через ${data.countdown.toFixed(1)}с`;
                document.getElementById('multiplier-text').className = "main-multiplier";
                
                // Выключаем анимацию сетки и прячем ракету
                document.getElementById('grid').className = "grid-bg";
                document.getElementById('rocket').className = "rocket-container";
                clearTrajectory();
                
                updateUI("WAITING", 0);

            } else if (data.status === "FLYING") {
                document.getElementById('multiplier-text').innerText = `${data.multiplier.toFixed(2)}x`;
                document.getElementById('status-text').innerText = `Ракета летит`;
                document.getElementById('multiplier-text').className = "main-multiplier flying";
                
                // Включаем анимацию движения сетки
                document.getElementById('grid').className = "grid-bg moving";
                
                // Обновляем позицию ракеты и линию траектории
                drawRocketFlight(data.multiplier);

                updateUI("FLYING", data.multiplier);

            } else if (data.status === "CRASHED") {
                hasBetInCurrentRound = false;
                document.getElementById('multiplier-text').innerText = `CRASH @ ${data.multiplier.toFixed(2)}x`;
                document.getElementById('status-text').innerText = `Ракета взорвалась`;
                document.getElementById('multiplier-text').className = "main-multiplier crashed";
                
                document.getElementById('grid').className = "grid-bg";
                document.getElementById('rocket').className = "rocket-container";

                if (data.history) {
                    renderHistory(data.history);
                }

                updateUI("CRASHED", 0);
            }
        });

        // Синхронизация таблицы игроков
        socket.on('sync_players', (players) => {
            const listContainer = document.getElementById('players-list');
            listContainer.innerHTML = '';
            
            players.forEach(p => {
                const row = document.createElement('div');
                row.className = 'player-row';
                if (p.cashedOut) {
                    row.classList.add('p-row-win');
                    row.innerHTML = `<span class="p-name">✅ ${p.username} (${p.mult}x)</span><span class="p-bet">+${p.winAmount} ⭐</span>`;
                } else {
                    row.innerHTML = `<span class="p-name">🚀 ${p.username}</span><span class="p-bet">${p.amount} ⭐</span>`;
                }
                listContainer.appendChild(row);
            });
        });

        // Сервер подтвердил, что мы забрали деньги
        socket.on('cashout_success', (data) => {
            alreadyCashedOut = true;
            showToast(`Вы успешно забрали ${data.winAmount} ⭐ на ${data.mult}x!`, true);
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
            updateUI("FLYING");
        });

        // Показ уведомлений
        socket.on('notification', (data) => {
            showToast(data.text, false);
        });

        // Моментальный пуш при пополнении звезд
        socket.on('payment_credited', (data) => {
            if (data.userId == userTelegramId) {
                currentBalance = data.newBalance;
                document.getElementById('balance-display').innerText = currentBalance;
                showToast(`Баланс пополнен на сервере!`, true);
            }
        });

        /* --- КЛИЕНТСКИЕ ФУНКЦИИ УПРАВЛЕНИЯ КНОПКАМИ --- */
        function updateUI(status, currentMultiplier = 0) {
            // Прячем сначала все кнопки управления
            btnPlace.style.display = 'none';
            btnWaiting.style.display = 'none';
            btnCashout.style.display = 'none';

            if (status === "WAITING") {
                if (hasBetInCurrentRound) {
                    btnWaiting.style.display = 'flex'; // Ставка уже сделана, ждем взлета
                } else {
                    btnPlace.style.display = 'flex'; // Можно поставить ставку
                }
            } else if (status === "FLYING") {
                if (hasBetInCurrentRound && !alreadyCashedOut) {
                    // Вычисляем динамический выигрыш на кнопке
                    const currentBetVal = parseInt(document.getElementById('bet-input-field').value) || 0;
                    const estimatedWin = Math.floor(currentBetVal * currentMultiplier);
                    btnCashout.innerText = `ЗАБРАТЬ ${estimatedWin} ⭐`;
                    btnCashout.style.display = 'flex'; 
                } else if (hasBetInCurrentRound && alreadyCashedOut) {
                    btnWaiting.innerText = "Успешно забрано";
                    btnWaiting.style.display = 'flex';
                } else {
                    btnWaiting.innerText = "Идет полет...";
                    btnWaiting.style.display = 'flex';
                }
            } else if (status === "CRASHED") {
                btnWaiting.innerText = "Взрыв ракеты...";
                btnWaiting.style.display = 'flex';
            }
        }

        // Клик по кнопке "Поставить ставку"
        function sendBet() {
            const betInput = document.getElementById('bet-input-field');
            const betAmount = parseInt(betInput.value);

            if (isNaN(betAmount) || betAmount < 5) {
                return showToast("Минимальная ставка — 5 ⭐", false);
            }
            if (betAmount > currentBalance) {
                return showToast("Недостаточно баланса на сервере!", false);
            }

            // Отправляем событие на сервер
            socket.emit('place_bet', {
                userId: userTelegramId,
                username: userTelegramName,
                amount: betAmount
            });

            hasBetInCurrentRound = true;
            updateUI("WAITING");
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        // Клик по кнопке "ЗАБРАТЬ"
        function sendCashout() {
            if (currentStatus !== "FLYING" || alreadyCashedOut) return;
            socket.emit('cashout_bet');
        }

        /* --- ВСПОМОГАТЕЛЬНЫЙ ИНТЕРФЕЙС (КЛИКИ И АНИМАЦИИ) --- */
        function changeBet(val) {
            const betInput = document.getElementById('bet-input-field');
            let current = parseInt(betInput.value) || 0;
            betInput.value = Math.max(5, current + val);
        }

        function setBetValue(val) {
            document.getElementById('bet-input-field').value = val;
        }

        function showToast(text, isSuccess) {
            const toast = document.getElementById('toast-msg');
            toast.innerText = text;
            toast.className = isSuccess ? "toast show success" : "toast show";
            setTimeout(() => {
                toast.className = "toast";
            }, 2500);
        }

        function renderHistory(history) {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            history.forEach(mult => {
                const item = document.createElement('div');
                item.className = 'history-item';
                if (mult <= 1.2) item.classList.add('low');
                else if (mult <= 2.5) item.classList.add('medium');
                else item.classList.add('high');
                
                item.innerText = `${mult.toFixed(2)}x`;
                container.appendChild(item);
            });
        }

        // Отрисовка траектории и положения ракеты на холсте
        function drawRocketFlight(mult) {
            const rocket = document.getElementById('rocket');
            const path = document.getElementById('flight-path');
            
            // Нормализуем координаты под иксы полета (ограничиваем графиком)
            let progress = Math.min(1, (mult - 1) / 4); // 5х — это правый верхний угол
            
            let startX = 50;
            let startY = 220;
            let endX = 50 + (progress * 180);
            let endY = 220 - (Math.pow(progress, 1.5) * 140);

            rocket.className = "rocket-container active";
            rocket.style.left = `${endX}px`;
            rocket.style.bottom = `${240 - endY}px`;

            // Обновляем SVG кривую
            path.setAttribute('d', `M ${startX} ${startY} Q ${startX + (endX - startX)/2} ${startY} ${endX} ${endY}`);
        }

        function clearTrajectory() {
            document.getElementById('flight-path').setAttribute('d', 'M 0 0');
        }

        // Кнопка "+" пополнения счета: шлет запрос инвойса к Bot API через Node.js
        function requestDeposit() {
            fetch('/api/create-invoice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userTelegramId, amount: 50 })
            })
            .then(res => res.json())
            .then(data => {
                if (data.invoiceLink) {
                    showToast("Инвойс сгенерирован сервером!", true);
                    if (tg && tg.openInvoice) {
                        tg.openInvoice(data.invoiceLink, function(status) {
                            if (status === 'paid') {
                                showToast("Оплата успешно произведена!", true);
                            }
                        });
                    } else {
                        // Эмуляция для отладки в браузере телефона
                        window.open(data.invoiceLink, '_blank');
                    }
                }
            })
            .catch(err => showToast("Ошибка генерации инвойса", false));
        }
    </script>
</body>
</html>
