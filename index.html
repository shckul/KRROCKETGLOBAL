<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KR ROCKET</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #060610;
            --panel: #0c0c1a;
            --panel-alt: #111125;
            --accent: #b8944a;
            --accent-dim: #7a6235;
            --red: #a83232;
            --green: #2d7a4a;
            --text: #d0d0d8;
            --text-dim: #5a5a6e;
            --border: #1a1a30;
            --gold: #b8944a;
            --gold-light: #d4b063;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
        }

        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #040410;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }
        #loading-screen.hidden { display: none; }
        .loading-title { font-size: 36px; font-weight: 700; letter-spacing: 8px; color: var(--gold); }
        .loading-bar-outer { width: 260px; height: 3px; background: #1a1a30; overflow: hidden; border-radius: 2px; }
        .loading-bar-inner { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s linear; border-radius: 2px; }
        #loading-percent { font-size: 14px; color: var(--text-dim); letter-spacing: 3px; }

        #app { display: none; flex-direction: column; height: 100%; width: 100%; }
        #app.visible { display: flex; }

        #balance-bar {
            background: var(--panel);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            letter-spacing: 2px;
            min-height: 44px;
            z-index: 50;
        }
        #balance-amount { color: var(--gold-light); font-weight: 700; font-size: 17px; }
        #balance-arrow { font-size: 10px; transition: 0.2s; padding: 4px; }

        #balance-menu {
            display: none;
            position: absolute;
            top: 46px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-alt);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            z-index: 100;
            width: 280px;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        #balance-menu.visible { display: flex; }
        #balance-menu input {
            background: #0a0a18;
            border: 1px solid var(--border);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
            width: 100%;
            outline: none;
            -webkit-appearance: none;
        }
        #balance-menu input:focus { border-color: var(--gold); }
        #balance-menu button {
            background: var(--gold);
            border: none;
            color: #0a0a0a;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            -webkit-appearance: none;
            touch-action: manipulation;
        }
        #balance-menu button.withdraw-btn { background: transparent; border: 1px solid var(--border); color: var(--text); }
        #balance-menu button:active { opacity: 0.8; transform: scale(0.98); }
        #balance-menu .menu-hint { font-size: 10px; color: var(--text-dim); text-align: center; }

        #content { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        #crash-content { display: flex; flex-direction: column; flex: 1; }
        #crash-content.hidden { display: none; }

        #top-section { flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
        #multiplier-box { background: var(--panel); border-radius: 12px; padding: 16px; text-align: center; border: 1px solid var(--border); }
        #multiplier-value { font-size: 76px; font-weight: 600; letter-spacing: 4px; font-family: 'SF Mono', 'Courier New', monospace; transition: color 0.3s; line-height: 1; }
        #multiplier-value.waiting { color: var(--text-dim); }
        #multiplier-value.flying { color: var(--gold-light); }
        #multiplier-value.crashed { color: var(--red); }
        #timer-label { font-size: 11px; color: var(--text-dim); margin-top: 8px; letter-spacing: 3px; text-transform: uppercase; }
        #timer-value { font-weight: 700; color: var(--text); font-size: 17px; }

        #history-row { display: flex; gap: 5px; overflow-x: auto; padding: 2px 0; flex-shrink: 0; min-height: 26px; align-items: center; -webkit-overflow-scrolling: touch; }
        #history-row::-webkit-scrollbar { display: none; }
        .history-bubble { padding: 4px 9px; border-radius: 5px; font-size: 10px; font-weight: 700; white-space: nowrap; flex-shrink: 0; font-family: 'SF Mono', 'Courier New', monospace; }
        .history-bubble.green { background: #0f1e14; color: var(--green); border: 1px solid #1a3020; }
        .history-bubble.red { background: #1e1114; color: var(--red); border: 1px solid #301820; }
        .history-bubble.purple { background: #161220; color: #8a7eb8; border: 1px solid #241e32; }

        #center-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; width: 100%; max-width: 400px; margin: 0 auto; }
        #bet-input { width: 100%; background: var(--panel); border: 2px solid var(--border); color: #fff; padding: 18px; border-radius: 12px; font-size: 20px; text-align: center; outline: none; font-weight: 700; -webkit-appearance: none; letter-spacing: 2px; }
        #bet-input:focus { border-color: var(--gold); }
        #bet-input:disabled { opacity: 0.35; background: #0a0a14; }
        #bet-input.hidden { display: none; }
        #action-btn { width: 100%; padding: 20px; border-radius: 12px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; letter-spacing: 4px; text-transform: uppercase; transition: 0.15s; -webkit-appearance: none; touch-action: manipulation; }
        #action-btn:active { transform: scale(0.96); opacity: 0.85; }
        #action-btn.bet-btn { background: var(--gold); color: #0a0a0a; }
        #action-btn.bet-btn:disabled { background: #18182a; color: #3a3a4a; cursor: not-allowed; transform: none; }
        #action-btn.cashout-btn { background: #c49b3f; color: #0a0a0a; animation: subtle-pulse 2s ease-in-out infinite; }
        @keyframes subtle-pulse { 0%,100% { background: #c49b3f; } 50% { background: #d4a84b; } }

        #players-box { background: var(--panel); border-radius: 12px; padding: 10px 14px; flex-shrink: 0; border: 1px solid var(--border); max-height: 20vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #players-box .section-title { font-size: 10px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; }
        #players-list { display: flex; flex-direction: column; gap: 4px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: var(--panel-alt); border-radius: 7px; font-size: 13px; border: 1px solid transparent; min-height: 38px; }
        .player-row.won { border-color: #1a3020; background: #0d1a12; }
        .player-row.lost { border-color: #301820; background: #1a0f14; }
        .player-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 55%; color: var(--text-dim); }
        .player-bet { font-weight: 700; color: var(--gold-light); font-family: 'SF Mono', 'Courier New', monospace; }

        #profile-content { display: none; flex-direction: column; align-items: center; gap: 20px; padding-top: 16px; }
        #profile-content.active { display: flex; }
        #profile-avatar { width: 76px; height: 76px; border-radius: 50%; border: 2px solid var(--border); object-fit: cover; background: var(--panel); }
        #profile-name { font-size: 19px; font-weight: 700; letter-spacing: 1px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%; }
        .stat-card { background: var(--panel); border-radius: 10px; padding: 14px 8px; text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 24px; font-weight: 700; color: var(--gold-light); font-family: 'SF Mono', 'Courier New', monospace; }
        .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }

        #tab-bar { display: flex; border-top: 1px solid var(--border); background: var(--panel); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom, 0px); }
        .tab-btn { flex: 1; padding: 14px; text-align: center; font-size: 13px; font-weight: 700; border: none; background: transparent; color: var(--text-dim); cursor: pointer; letter-spacing: 3px; text-transform: uppercase; -webkit-appearance: none; touch-action: manipulation; }
        .tab-btn:active { background: rgba(255,255,255,0.03); }
        .tab-btn.active { color: var(--gold-light); border-top: 2px solid var(--gold); }

        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.8); background: var(--panel-alt); border: 1px solid var(--border); color: var(--text); padding: 14px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; letter-spacing: 1px; z-index: 200; opacity: 0; transition: 0.3s; pointer-events: none; text-align: center; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-title">KR ROCKET</div>
        <div class="loading-bar-outer"><div class="loading-bar-inner" id="loading-bar"></div></div>
        <div id="loading-percent">0%</div>
    </div>

    <div id="app">
        <div id="balance-bar">
            <span>BALANCE</span>
            <span id="balance-amount">0</span>
            <span style="color:var(--gold-light);">STARS</span>
            <span id="balance-arrow">▼</span>
            <div id="balance-menu">
                <input type="number" id="deposit-input" placeholder="Сумма пополнения" min="10" value="100" inputmode="numeric" pattern="[0-9]*">
                <button onclick="deposit()">ПОПОЛНИТЬ (Telegram Stars)</button>
                <button class="withdraw-btn" onclick="withdraw()">ВЫВЕСТИ</button>
                <div class="menu-hint">Мин. вывод: 100 STARS<br>Пополнение через Telegram</div>
            </div>
        </div>

        <div id="content">
            <div id="crash-content">
                <div id="top-section">
                    <div id="multiplier-box">
                        <div id="multiplier-value" class="waiting">1.00x</div>
                        <div id="timer-label">РАУНД <span id="timer-value">5</span></div>
                    </div>
                    <div id="history-row"></div>
                </div>
                <div id="center-section">
                    <input type="number" id="bet-input" placeholder="СТАВКА (мин 10)" min="10" value="10" inputmode="numeric" pattern="[0-9]*">
                    <button id="action-btn" class="bet-btn" onclick="handleAction()">СТАВКА</button>
                </div>
                <div id="players-box">
                    <div class="section-title">ИГРОКИ</div>
                    <div id="players-list">—</div>
                </div>
            </div>
            <div id="profile-content">
                <img id="profile-avatar" src="" alt="Avatar">
                <div id="profile-name">Player</div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Ставок</div></div>
                    <div class="stat-card"><div class="stat-value" id="stat-won">0</div><div class="stat-label">Выиграл</div></div>
                    <div class="stat-card"><div class="stat-value" id="stat-lost">0</div><div class="stat-label">Проиграл</div></div>
                </div>
            </div>
        </div>
        <div id="tab-bar">
            <button class="tab-btn active" onclick="switchTab('crash')">Crash</button>
            <button class="tab-btn" onclick="switchTab('profile')">Profile</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ====================
        // TELEGRAM INIT
        // ====================
        let tg = window.Telegram?.WebApp || null;
        let userId = null;

        if (tg) {
            tg.ready();
            tg.expand();
            const user = tg.initDataUnsafe?.user;
            if (user) {
                userId = user.id;
                document.getElementById('profile-name').textContent = user.username || user.first_name || 'Player';
                if (user.photo_url) document.getElementById('profile-avatar').src = user.photo_url;
            }
        }

        window.addEventListener('load', () => {
            if (!tg && window.Telegram?.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    userId = user.id;
                    document.getElementById('profile-name').textContent = user.username || user.first_name || 'Player';
                    if (user.photo_url) document.getElementById('profile-avatar').src = user.photo_url;
                }
            }
        });

        const avatar = document.getElementById('profile-avatar');
        if (!avatar.src || avatar.src === '' || avatar.src === window.location.href) {
            avatar.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%230c0c1a"/%3E%3Ctext x="50" y="62" text-anchor="middle" fill="%235a5a6e" font-size="38"%3EK%3C/text%3E%3C/svg%3E';
        }

        // ====================
        // WEBSOCKET
        // ====================
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}`;
        let ws;
        let balance = 0;

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                console.log('WebSocket connected');
                if (userId) {
                    ws.send(JSON.stringify({
                        type: 'auth',
                        userId: userId,
                        name: document.getElementById('profile-name').textContent,
                    }));
                }
            };
            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    handleServerMessage(msg);
                } catch (e) {
                    console.error('WS parse error:', e);
                }
            };
            ws.onclose = () => {
                console.log('WS disconnected, reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
            ws.onerror = (err) => {
                console.error('WS error:', err);
            };
        }

        // ====================
        // СОСТОЯНИЕ ИГРЫ
        // ====================
        const GAME = {
            phase: 'waiting',
            multiplier: 1.0,
            timer: 5,
            hasBet: false,
            hasCashedOut: false,
            betAmount: 0,
            players: [],
            history: [],
            stats: { total: 0, won: 0, lost: 0 },
            toastTimeout: null,
        };

        const $ = (id) => document.getElementById(id);

        function showToast(msg, duration = 2000) {
            const toast = $('toast');
            clearTimeout(GAME.toastTimeout);
            toast.textContent = msg;
            toast.classList.add('show');
            GAME.toastTimeout = setTimeout(() => toast.classList.remove('show'), duration);
        }

        function simulateLoading() {
            const bar = $('loading-bar');
            const p = $('loading-percent');
            const s = $('loading-screen');
            const a = $('app');
            let pr = 0;
            const iv = setInterval(() => {
                pr += Math.random() * 15 + 8;
                if (pr >= 100) {
                    pr = 100;
                    clearInterval(iv);
                    bar.style.width = '100%';
                    p.textContent = '100%';
                    setTimeout(() => {
                        s.classList.add('hidden');
                        a.classList.add('visible');
                        initApp();
                    }, 350);
                } else {
                    bar.style.width = pr + '%';
                    p.textContent = Math.round(pr) + '%';
                }
            }, 90);
        }

        function initApp() {
            connectWebSocket();
            updateUI();
        }

        function handleServerMessage(msg) {
            switch (msg.type) {
                case 'init':
                    GAME.phase = msg.gameState.phase;
                    GAME.multiplier = msg.gameState.multiplier;
                    GAME.timer = msg.gameState.timer;
                    break;

                case 'auth_success':
                    balance = msg.balance;
                    GAME.stats = msg.stats || { total: 0, won: 0, lost: 0 };
                    updateUI();
                    console.log('Auth success, balance:', balance);
                    break;

                case 'round_start':
                    GAME.phase = 'waiting';
                    GAME.multiplier = 1.0;
                    GAME.timer = msg.timer;
                    GAME.hasBet = false;
                    GAME.hasCashedOut = false;
                    GAME.betAmount = 0;
                    GAME.players = [];
                    $('multiplier-value').textContent = '1.00x';
                    $('multiplier-value').className = 'waiting';
                    $('timer-value').textContent = msg.timer;
                    $('timer-value').style.color = '';
                    $('bet-input').classList.remove('hidden');
                    $('bet-input').disabled = false;
                    $('bet-input').value = Math.min(balance, Math.max(10, parseInt($('bet-input').value) || 10));
                    $('action-btn').textContent = 'СТАВКА';
                    $('action-btn').className = 'bet-btn';
                    $('action-btn').disabled = false;
                    $('action-btn').style.background = '';
                    $('action-btn').style.color = '';
                    updateUI();
                    break;

                case 'timer_update':
                    GAME.timer = msg.timer;
                    $('timer-value').textContent = msg.timer;
                    if (msg.timer <= 2) $('timer-value').style.color = 'var(--accent-dim)';
                    break;

                case 'flight_start':
                    GAME.phase = 'flying';
                    GAME.hasCashedOut = false;
                    $('multiplier-value').className = 'flying';
                    $('timer-value').textContent = 'LIVE';
                    $('timer-value').style.color = 'var(--green)';
                    $('bet-input').classList.add('hidden');
                    $('bet-input').disabled = true;
                    if (GAME.hasBet) {
                        $('action-btn').textContent = 'ЗАБРАТЬ';
                        $('action-btn').className = 'cashout-btn';
                        $('action-btn').disabled = false;
                        $('action-btn').style.background = '';
                        $('action-btn').style.color = '';
                    } else {
                        $('action-btn').textContent = 'НЕТ СТАВКИ';
                        $('action-btn').className = 'bet-btn';
                        $('action-btn').disabled = true;
                        $('action-btn').style.background = '#18182a';
                        $('action-btn').style.color = '#3a3a4a';
                    }
                    break;

                case 'multiplier_update':
                    GAME.multiplier = msg.multiplier;
                    $('multiplier-value').textContent = msg.multiplier.toFixed(2) + 'x';
                    break;

                case 'crash':
                    GAME.phase = 'crashed';
                    $('multiplier-value').textContent = msg.crashPoint.toFixed(2) + 'x';
                    $('multiplier-value').className = 'crashed';
                    $('timer-value').textContent = 'CRASH';
                    $('timer-value').style.color = 'var(--red)';
                    $('bet-input').classList.remove('hidden');
                    $('bet-input').disabled = true;
                    $('action-btn').textContent = 'КРАШ';
                    $('action-btn').className = 'bet-btn';
                    $('action-btn').disabled = true;
                    $('action-btn').style.background = '';
                    $('action-btn').style.color = '';
                    GAME.players = msg.players.map(p => ({
                        name: p.name,
                        bet: p.bet,
                        status: p.cashedOut ? 'won' : 'lost'
                    }));
                    GAME.history.unshift({
                        val: msg.crashPoint,
                        cls: msg.crashPoint >= 2.0 ? 'purple' : msg.crashPoint >= 1.01 ? 'green' : 'red'
                    });
                    if (GAME.history.length > 30) GAME.history.length = 30;
                    if (GAME.hasBet && !GAME.hasCashedOut) {
                        GAME.stats.total++;
                        GAME.stats.lost++;
                    }
                    GAME.hasBet = false;
                    GAME.hasCashedOut = false;
                    updateUI();
                    break;

                case 'bet_accepted':
                    GAME.betAmount = msg.bet;
                    balance = msg.balance;
                    GAME.hasBet = true;
                    GAME.stats.total++;
                    updateUI();
                    showToast('СТАВКА: ' + msg.bet + ' STARS');
                    break;

                case 'players_update':
                    GAME.players = msg.players.map(p => ({
                        name: p.name,
                        bet: p.bet,
                        status: 'playing'
                    }));
                    renderPlayers();
                    break;

                case 'cashout_success':
                    GAME.hasCashedOut = true;
                    balance = msg.balance;
                    GAME.stats.won++;
                    $('action-btn').disabled = true;
                    $('action-btn').textContent = 'ЗАБРАНО';
                    $('action-btn').style.background = 'var(--green)';
                    $('action-btn').style.color = '#fff';
                    updateUI();
                    showToast('ВЫИГРЫШ: ' + msg.winAmount + ' STARS');
                    break;

                case 'player_cashed_out':
                    const idx = GAME.players.findIndex(p => p.name === msg.playerName && p.status === 'playing');
                    if (idx !== -1) GAME.players[idx].status = 'won';
                    renderPlayers();
                    break;

                case 'balance_update':
                    balance = msg.balance;
                    updateUI();
                    console.log('Balance updated:', balance);
                    break;

                // === НОВЫЙ CASE ДЛЯ ВЫВОДА ===
                case 'withdraw_success':
                    balance = msg.balance;
                    updateUI();
                    showToast('ВЫВОД ' + msg.amount + ' STARS. ЗАЯВКА ПРИНЯТА');
                    break;

                case 'error':
                    showToast(msg.message);
                    break;
            }
        }

        function updateUI() {
            $('balance-amount').textContent = balance.toLocaleString();
            $('stat-total').textContent = GAME.stats.total;
            $('stat-won').textContent = GAME.stats.won;
            $('stat-lost').textContent = GAME.stats.lost;
            renderHistory();
            renderPlayers();
        }

        function renderHistory() {
            $('history-row').innerHTML = GAME.history.slice(0, 15).map(h =>
                `<span class="history-bubble ${h.cls}">${h.val.toFixed(2)}x</span>`
            ).join('');
        }

        function renderPlayers() {
            const l = $('players-list');
            if (!GAME.players.length) {
                l.innerHTML = '<div style="color:var(--text-dim);text-align:center;font-size:12px;padding:6px;">Нет ставок</div>';
                return;
            }
            l.innerHTML = [...GAME.players].sort((a, b) => b.bet - a.bet).map(p => {
                let cls = '';
                let st = '';
                if (p.status === 'won') { cls = 'won';
                    st = 'WIN'; } else if (p.status === 'lost') { cls = 'lost';
                    st = 'LOSS'; }
                return `<div class="player-row ${cls}">
                    <span class="player-name">${esc(p.name)}</span>
                    <span class="player-bet">${p.bet} STARS${st ? ' <span style="color:' + (p.status === 'won' ? 'var(--green)' : 'var(--red)') + ';font-size:10px;font-weight:700;">' + st + '</span>' : ''}</span>
                </div>`;
            }).join('');
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ====================
        // ДЕЙСТВИЯ ИГРОКА
        // ====================
        function handleAction() {
            if (GAME.phase === 'waiting') placeBet();
            else if (GAME.phase === 'flying' && GAME.hasBet && !GAME.hasCashedOut) cashOut();
        }

        function placeBet() {
            if (GAME.phase !== 'waiting') return;
            if (!userId) { showToast('Откройте в Telegram'); return; }
            const a = parseInt($('bet-input').value);
            if (!a || a < 10) { showToast('МИН. СТАВКА: 10 STARS'); return; }
            if (a > balance) { showToast('Пополните баланс'); return; }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'place_bet', amount: a }));
                $('action-btn').disabled = true;
                $('bet-input').disabled = true;
            }
        }

        function cashOut() {
            if (GAME.phase !== 'flying' || !GAME.hasBet || GAME.hasCashedOut) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'cashout' }));
                $('action-btn').disabled = true;
            }
        }

        // ====================
        // ПОПОЛНЕНИЕ
        // ====================
        async function deposit() {
            if (!tg && window.Telegram?.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
            }

            if (!tg) {
                showToast('Откройте в Telegram Mini App');
                console.error('TG not available');
                return;
            }

            if (!userId && tg.initDataUnsafe?.user) {
                userId = tg.initDataUnsafe.user.id;
            }

            if (!userId) {
                showToast('Ошибка: пользователь не определён');
                console.error('No userId');
                return;
            }

            const amount = parseInt($('deposit-input').value);
            if (!amount || amount < 1) {
                showToast('Введите сумму от 1 звезды');
                return;
            }

            showToast('Создание платежа...');

            try {
                const response = await fetch('/api/create-invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId, amount: amount }),
                });

                const data = await response.json();
                console.log('Invoice response:', data);

                if (data.invoice_link) {
                    tg.openInvoice(data.invoice_link, (status) => {
                        console.log('Payment status:', status);

                        if (status === 'paid') {
                            showToast('✅ Оплата прошла! Обновляем баланс...');

                            const requestBalance = () => {
                                if (ws && ws.readyState === WebSocket.OPEN) {
                                    ws.send(JSON.stringify({ type: 'get_balance' }));
                                }
                            };

                            setTimeout(requestBalance, 2000);
                            setTimeout(requestBalance, 4000);
                            setTimeout(requestBalance, 6000);
                        } else if (status === 'cancelled') {
                            showToast('Платёж отменён');
                        } else if (status === 'failed') {
                            showToast('Ошибка платежа');
                        }
                    });
                } else {
                    showToast('Ошибка создания платежа');
                    console.error('No invoice link in response:', data);
                }
            } catch (error) {
                console.error('Deposit error:', error);
                showToast('Ошибка сети. Попробуйте ещё раз.');
            }

            $('balance-menu').classList.remove('visible');
            $('balance-arrow').innerHTML = '▼';
        }

        // === НОВАЯ ФУНКЦИЯ ВЫВОДА ===
        function withdraw() {
            if (balance < 100) {
                showToast('МИН. ВЫВОД: 100 STARS');
                return;
            }

            if (!userId) {
                showToast('Ошибка: пользователь не определён');
                return;
            }

            const amount = prompt('Введите сумму вывода (мин. 100):', Math.min(balance, 500));
            if (!amount) return;

            const withdrawAmount = parseInt(amount);
            if (!withdrawAmount || withdrawAmount < 100) {
                showToast('Минимальная сумма: 100 STARS');
                return;
            }
            if (withdrawAmount > balance) {
                showToast('Недостаточно средств');
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'withdraw_request',
                    userId: userId,
                    amount: withdrawAmount,
                    username: document.getElementById('profile-name').textContent || 'Player'
                }));
            } else {
                showToast('Ошибка соединения');
            }

            $('balance-menu').classList.remove('visible');
            $('balance-arrow').innerHTML = '▼';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (tab === 'crash') {
                $('crash-content').classList.remove('hidden');
                $('profile-content').classList.remove('active');
                document.querySelector('.tab-btn:first-child').classList.add('active');
            } else {
                $('crash-content').classList.add('hidden');
                $('profile-content').classList.add('active');
                document.querySelector('.tab-btn:last-child').classList.add('active');
                updateUI();
            }
        }

        // Меню баланса
        $('balance-bar').addEventListener('click', (e) => {
            e.stopPropagation();
            $('balance-menu').classList.toggle('visible');
            $('balance-arrow').innerHTML = $('balance-menu').classList.contains('visible') ? '▲' : '▼';
        });

        document.addEventListener('click', (e) => {
            if (!$('balance-menu').contains(e.target) && e.target !== $('balance-bar')) {
                $('balance-menu').classList.remove('visible');
                $('balance-arrow').innerHTML = '▼';
            }
        });

        $('balance-menu').addEventListener('click', (e) => e.stopPropagation());

        // Защита от выхода
        window.addEventListener('beforeunload', (e) => {
            if (GAME.hasBet && GAME.phase === 'flying' && !GAME.hasCashedOut) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // Запуск
        simulateLoading();
    </script>
</body>
</html>
